<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Восстановление пароля</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/auth.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>Восстановление пароля</h1>
    <p class="auth-subtitle">Введите email, и мы отправим ссылку для сброса пароля</p>
    <form id="forgotPasswordForm">
      <div class="auth-input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="auth-button" id="resetBtn">Отправить ссылку</button>
    </form>
    <div class="auth-footer">
      <a href="index.html" class="back-link">← Вернуться ко входу</a>
    </div>
    <div id="message" class="message"></div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const resetBtn = document.getElementById('resetBtn');
      const messageDiv = document.getElementById('message');

      resetBtn.disabled = true;
      resetBtn.textContent = 'Отправка...';

      try {
        await resetPassword(email);
        messageDiv.innerHTML = `
          <div class="success">
            ✅ Письмо отправлено на ${email}<br>
            <small>Проверьте папку "Спам", если письмо не приходит</small>
          </div>
        `;
        document.getElementById('email').value = '';
      } catch (error) {
        console.error('Ошибка:', error);
        let errorMessage = '';
        if (error.code === 'auth/network-request-failed') {
          errorMessage = '🌐 Проблема с интернетом. Проверьте подключение.';
        } else if (error.code === 'auth/user-not-found') {
          errorMessage = '📧 Пользователь с таким email не найден';
        } else if (error.code === 'auth/invalid-email') {
          errorMessage = '📧 Некорректный формат email';
        } else if (error.code === 'auth/too-many-requests') {
          errorMessage = '⏳ Слишком много попыток. Попробуйте позже.';
        } else {
          errorMessage = '❌ Ошибка при отправке. Попробуйте позже.';
        }
        messageDiv.innerHTML = `<div class="error">${errorMessage}</div>`;
      } finally {
        resetBtn.disabled = false;
        resetBtn.textContent = 'Отправить ссылку';
      }
    });
  </script>
</body>
</html>
