<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Восстановление пароля</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔑</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>Восстановление пароля</h1>
    <p class="auth-subtitle">Введите email, и мы отправим ссылку для сброса пароля</p>
    <form id="forgotPasswordForm">
      <div class="auth-input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <button type="submit" class="auth-button" id="resetBtn">Отправить ссылку</button>
    </form>
    <div class="auth-footer">
      <a href="index.html" class="back-link">← Вернуться ко входу</a>
    </div>
    <div id="message" class="message"></div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
