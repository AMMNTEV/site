<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>Профиль пользователя</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👤</text></svg>">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/profile.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
  <style>
    /* Те же стили, что и в profile.html */
    .app-container { max-width: 600px; margin: 0 auto; background: #fff; min-height: 100vh; position: relative; padding-bottom: 60px; }
    .profile-cover { height: 180px; background: linear-gradient(to bottom, #eee, #999); position: relative; }
    .back-btn-overlay { position: absolute; top: 20px; left: 20px; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(5px); color: #fff; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 20px; }
    .profile-main { padding: 0 20px; margin-top: -45px; position: relative; }
    .avatar-large { width: 90px; height: 90px; border-radius: 24px; border: 4px solid #fff; background: #ccc; overflow: hidden; }
    .profile-top-actions { position: absolute; right: 20px; top: 55px; display: flex; gap: 10px; }
    .btn-rounded { padding: 8px 16px; border-radius: 20px; border: 1px solid #ddd; background: #fff; font-weight: 600; cursor: pointer; color: #000; }
    .btn-rounded.primary { background: #000; color: #fff; border: none; }
    .profile-tabs { display: flex; border-bottom: 1px solid #eee; margin-top: 20px; padding: 0 20px; }
    .tab { padding: 10px 15px; font-weight: 600; color: #777; cursor: pointer; }
    .tab.active { color: #000; border-bottom: 2px solid #000; }
    
    .mobile-bottom-nav { display: none; }
    @media (max-width: 768px) {
      .mobile-bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-top: 1px solid #eee; justify-content: space-around; padding: 15px 0; padding-bottom: env(safe-area-inset-bottom, 15px); z-index: 1000; }
      .nav-item { text-decoration: none; color: #000; font-size: 24px; display: flex; align-items: center; justify-content: center; width: 50px; }
      .mobile-menu-btn, .mobile-popup-menu, .sidebar-overlay { display: none !important; }
    }
  </style>
</head>
<body>
  <!-- Контейнер profileContent оставлен для рендера через user.js -->
  <div class="app-container" id="profileContent">
    <div class="profile-cover">
      <a href="messenger.html" class="back-btn-overlay" id="backButton">‹</a>
    </div>
    
    <div class="profile-main">
      <div class="avatar-large"></div>
      <div class="profile-top-actions">
        <!-- Пример кнопок "Написать" и "Подписаться" из референса -->
        <button class="btn-rounded">✉️</button>
        <button class="btn-rounded primary">Follow</button>
      </div>
      <div class="loading" style="margin-top: 20px;">Загрузка профиля...</div>
    </div>
  </div>

  <nav class="mobile-bottom-nav">
    <a href="profile.html" class="nav-item">👤</a>
    <a href="messenger.html" class="nav-item">💬</a>
  </nav>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/user.js"></script>
</body>
</html>
