<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход в аккаунт</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/auth.css">
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1>Вход в аккаунт</h1>
    <form id="loginForm">
      <div class="auth-input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" required>
      </div>
      <div class="auth-input-group">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      <div class="auth-links">
        <a href="forgot-password.html" class="forgot-password-link">Забыли пароль?</a>
      </div>
      <button type="submit" class="auth-button" id="loginBtn">Войти</button>
    </form>
    <div class="auth-footer">
      Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
    </div>
    <div id="message" class="message"></div>
  </div>

  <script src="js/firebase-config.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // ========== КОСТЫЛЬ: СОЗДАНИЕ ВТОРОГО АККАУНТА ==========
    async function createSecondAccount(currentEmail, currentPassword) {
      const email = 'ivan@golden.ru';
      const password = '123213';
      const nickname = 'GoldenVania';
      const tag = '@GoldenVania';

      try {
        const methods = await auth.fetchSignInMethodsForEmail(email);
        if (methods.length > 0) {
          console.log('ℹ️ Второй аккаунт уже существует');
          return;
        }

        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        await db.collection('users').doc(user.uid).set({
          nickname: nickname,
          tag: tag,
          email: email,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        console.log('✅ Второй аккаунт создан:', email);

        // Восстанавливаем сессию исходного пользователя
        await auth.signInWithEmailAndPassword(currentEmail, currentPassword);
      } catch (error) {
        if (error.code === 'auth/email-already-in-use') {
          console.log('ℹ️ Аккаунт уже существует (перехвачено)');
        } else {
          console.error('Ошибка создания второго аккаунта:', error);
        }
      }
    }

    // ========== ОБЫЧНАЯ ЛОГИКА ВХОДА ==========
    onAuthStateChanged((user) => {
      // Пропускаем верификацию для ivan@golden.ru
      if (user && (user.emailVerified || user.email === 'ivan@golden.ru')) {
        window.location.href = 'messenger.html';
      }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const loginBtn = document.getElementById('loginBtn');
      const messageDiv = document.getElementById('message');

      loginBtn.disabled = true;
      loginBtn.textContent = 'Вход...';

      try {
        const userCredential = await login(email, password);
        const user = userCredential.user;

        // Создаём второй аккаунт (если его нет)
        await createSecondAccount(email, password);

        // После создания мы всё ещё залогинены под исходным пользователем
        const currentUser = auth.currentUser;
        if (currentUser && (currentUser.emailVerified || currentUser.email === 'ivan@golden.ru')) {
          window.location.href = 'messenger.html';
        } else if (currentUser) {
          // Аккаунт не верифицирован
          messageDiv.innerHTML = `
            <div class="warning">
              <strong>ⓘ Аккаунт не активирован</strong>
              <p>На почту ${currentUser.email} отправлено письмо с подтверждением.</p>
              <div style="margin: 10px 0;">
                <input type="password" id="resendPassword" placeholder="Введите пароль" style="width: 100%; padding: 8px; border: 1px solid #ffeeba; border-radius: 4px;">
              </div>
              <button onclick="resendVerification('${currentUser.email}')" class="resend-btn">Отправить снова</button>
            </div>
          `;
          await auth.signOut();
        } else {
          messageDiv.innerHTML = `<div class="error">Ошибка входа</div>`;
        }
      } catch (error) {
        console.error('Ошибка входа:', error);
        let errorMessage = '';
        if (error.code === 'auth/network-request-failed') {
          errorMessage = '🌐 Проблема с интернетом. Проверьте подключение и попробуйте снова.';
        } else if (error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
          errorMessage = '❌ Неверный email или пароль';
        } else if (error.code === 'auth/invalid-email') {
          errorMessage = '📧 Некорректный формат email';
        } else if (error.code === 'auth/too-many-requests') {
          errorMessage = '⏳ Слишком много попыток. Подождите несколько минут и попробуйте снова.';
        } else if (error.code === 'auth/user-disabled') {
          errorMessage = '🚫 Аккаунт заблокирован';
        } else {
          errorMessage = '❌ Ошибка при входе. Попробуйте позже.';
        }
        messageDiv.innerHTML = `<div class="error">${errorMessage}</div>`;
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = 'Войти';
      }
    });

    window.resendVerification = async (email) => {
      const password = document.getElementById('resendPassword')?.value;
      if (!password) { alert('Введите пароль'); return; }
      const messageDiv = document.getElementById('message');
      messageDiv.innerHTML = '<div class="loading">Отправка...</div>';
      try {
        await login(email, password);
        const user = auth.currentUser;
        if (user) {
          await sendVerificationEmail();
          await auth.signOut();
          messageDiv.innerHTML = `
            <div class="success">
              ✅ Письмо отправлено повторно на ${email}!<br>
              <small>Проверьте папку "Спам"</small>
            </div>
          `;
        } else {
          throw new Error('User not found');
        }
      } catch (error) {
        console.error('Ошибка отправки:', error);
        let errorMessage = '';
        if (error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
          errorMessage = '❌ Неверный email или пароль';
        } else if (error.code === 'auth/too-many-requests') {
          errorMessage = '⏳ Слишком много попыток. Подождите несколько минут и попробуйте снова.';
        } else if (error.code === 'auth/network-request-failed') {
          errorMessage = '🌐 Проблема с интернетом';
        } else {
          errorMessage = '❌ Ошибка при отправке. Попробуйте позже.';
        }
        messageDiv.innerHTML = `<div class="error">${errorMessage}</div>`;
      }
    };
  </script>
</body>
</html>
